<style>
  :host {
    display: block; position: relative; width: 100%; height: 100%;
    min-height: 500px; background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: white; border-radius: 16px;
  }
  .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* Processing Screen */
  #processingScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(15, 18, 23, 0.95); z-index: 20; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.3);
    border-top: 4px solid #46a3db; border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  #progressText { font-size: 14px; color: white; font-weight: 500; text-align: center; padding: 0 20px;}

  /* Error Screen */
  #errorScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(15, 18, 23, 0.95); z-index: 30; gap: 16px; padding: 24px; text-align: center;
  }
  .error-title { font-size: 18px; font-weight: 600; color: #ef4444; }
  #errorText { font-size: 14px; color: white; }
  .btn-retry {
    background: #46a3db; color: white; border: none; padding: 12px 24px;
    border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>

<vitallens-start class="layer" id="startScreen" title-text="VitalLens File Processing" subtitle="Estimate vital signs from<br>a video file" timing-hint="Processing time<br>depends on video size." button-label="Select Video File" hide-mode-toggle></vitallens-start>

<div class="layer" id="processingScreen" style="display: none;">
  <div class="spinner"></div>
  <div id="progressText">Processing video...</div>
</div>

<vitallens-result class="layer" id="resultScreen" title-text="Scan Complete" style="display: none;"></vitallens-result>

<div class="layer" id="errorScreen" style="display: none;">
  <div class="error-title">Error</div>
  <div id="errorText"></div>
  <button class="btn-retry" id="retryBtn">Try Again</button>
</div>

<input type="file" id="fileInput" accept="video/*" style="display: none;">
